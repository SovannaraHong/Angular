<div class="pt-[140px]">
  <h1 class="text-center font-bold text-2xl uppercase">This is detail</h1>
</div>

@if (productDetailList$ | async; as product) {
  <div class="grid grid-cols-2 gap-16 p-20">
    <!-- Image -->
    <div>
      <img [src]="product.thumbnail" class="w-full rounded-3xl shadow-2xl" />
    </div>

    <!-- Info -->
    <div>
      <h1 class="text-4xl font-bold">{{ product.title }}</h1>

      <p class="text-gray-500 mt-4">
        {{ product.description }}
      </p>

      <div class="mt-6 text-3xl font-bold text-pink-600">${{ product.price }}</div>

      <div class="mt-4 text-green-600">Stock: {{ product.stock }}</div>

      <div class="mt-8 flex gap-6">
        <button class="bg-pink-600 text-white px-6 py-3 rounded-full">Add To Cart</button>

        <button class="border border-pink-600 text-pink-600 px-6 py-3 rounded-full">Buy Now</button>
      </div>
    </div>
  </div>
}
