<div class="pt-[140px]">
  <h1 class="text-center font-bold text-2xl uppercase">This is user</h1>
</div>
@if (userList$ | async; as userList) {
  <div class="grid grid-cols-4 gap-10 p-20">
    @for (user of userList; track $index) {
      <div
        class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden hover:shadow-3xl transition duration-500"
      >
        <!-- Cover Background -->
        <div class="h-28 bg-gradient-to-r from-purple-500 to-pink-500"></div>

        <!-- Profile Section -->
        <div class="relative flex flex-col items-center -mt-16 px-6 pb-6">
          <!-- Profile Image -->
          <img
            [src]="user.image"
            alt="User Image"
            class="w-28 h-28 rounded-full border-4 border-white shadow-lg object-cover"
          />

          <!-- Name -->
          <h2 class="mt-4 text-2xl font-bold text-gray-800">{{ user.firstName }}</h2>

          <!-- Username -->
          <p class="text-purple-600 font-medium text-sm">{{ user.username }}</p>

          <!-- Info Section -->
          <div class="w-full mt-6 space-y-3 text-sm text-gray-600">
            <div class="flex justify-between border-b pb-2">
              <span class="font-semibold">{{ user.id }}</span>
              <span>1</span>
            </div>

            <div class="flex justify-between border-b pb-2">
              <span class="font-semibold">{{ user.email }}</span>
              <span>john@example.com</span>
            </div>

            <div class="flex justify-between border-b pb-2">
              <span class="font-semibold">{{ user.phone }}</span>
              <span>+855 123 456 789</span>
            </div>
          </div>

          <!-- Buttons -->
          <div class="mt-6 flex space-x-4 w-full">
            <button
              class="flex-1 bg-purple-600 text-white py-2 rounded-full shadow-md hover:bg-purple-700 transition duration-300"
            >
              View Profile
            </button>

            <button
              class="flex-1 bg-pink-500 text-white py-2 rounded-full shadow-md hover:bg-pink-600 transition duration-300"
            >
              Edit User
            </button>
          </div>
        </div>
      </div>
    }
  </div>
} @else {
  <div class="flex justify-center items-center h-40">
    <div
      class="w-12 h-12 border-4 border-blue-300 border-t-blue-600 rounded-full animate-spin"
    ></div>
  </div>
}
