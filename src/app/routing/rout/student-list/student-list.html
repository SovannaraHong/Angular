<div class="pt-[100px] flex justify-center items-center">
  <h1 class="border-b font-bold uppercase">Student list Page</h1>
</div>
<h1>Products</h1>

@for (product of productList; track product.id) {
  <div class="p-3 border mb-2 rounded shadow">
    <h2>{{ product.title }}</h2>
    <p>Price: ${{ product.price }}</p>
    <img [src]="product.thumbnail" alt="{{ product.title }}" class="w-32" />
  </div>
}
