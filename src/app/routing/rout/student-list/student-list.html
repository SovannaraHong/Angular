<!-- Loading Spinner -->
<div *ngIf="loading" class="pt-10 flex justify-center">
  <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-purple-500"></div>
</div>

<!-- User Cards -->
<div
  *ngIf="!loading"
  class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 pt-[20px]"
>
  <div
    *ngFor="let people of userList; let i = index"
    class="backdrop-blur-lg bg-white/40 border border-white/30 shadow-2xl rounded-3xl p-6 w-[340px] transition-all duration-300 hover:scale-105 hover:shadow-purple-400/50"
  >
    <div class="flex justify-center">
      <img
        src="{{ people.image }}"
        class="w-28 h-28 rounded-full border-4 border-white shadow-lg object-cover"
      />
    </div>

    <div class="text-center mt-4">
      <h2 class="text-2xl font-bold text-gray-800">{{ people.firstName }} {{ people.lastName }}</h2>
      <p class="text-sm text-gray-600">@{{ people.username }}</p>
    </div>

    <div class="mt-5 space-y-2 text-sm text-gray-700">
      <p><span class="font-semibold">Maiden Name:</span> {{ people.maidenName }}</p>
      <p><span class="font-semibold">Age:</span> {{ people.age }}</p>
      <p><span class="font-semibold">Gender:</span> {{ people.gender }}</p>
      <p class="truncate"><span class="font-semibold">Email:</span> {{ people.email }}</p>
      <p><span class="font-semibold">Phone:</span> {{ people.phone }}</p>
    </div>

    <div class="mt-6 text-center">
      <button
        class="bg-gradient-to-r from-purple-500 to-indigo-500 text-white px-6 py-2 rounded-xl shadow-md hover:from-indigo-500 hover:to-purple-500 transition-all duration-300"
      >
        View Profile
      </button>
    </div>
  </div>
</div>
